<!DOCTYPE html>
<html>
<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
  <script>
    function setup() {
      // 3D用の画面
      createCanvas(windowWidth, windowHeight, WEBGL);
    }

    function draw() {
      background(30); // 背景
      
      // マウスで視点を動かせるようにする
      orbitControl();

      // --- 3Dの箱を描く ---
      push();
      stroke(255); // 枠線は白
      noFill();    // 中身は塗らない
      rotateX(frameCount * 0.01);
      rotateY(frameCount * 0.01);
      box(150);
      pop();

      
    }
  </script>
</body>
</html>
