<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>English Learning App</title>
  <style>
    :root { 
      --bg-dark: #0f172a; --card-bg: #1e293b; --border: #334155; --text: #f8fafc; 
      --primary: #38bdf8; 
    }
    * { scrollbar-width: none !important; -ms-overflow-style: none !important; box-sizing: border-box; }
    *::-webkit-scrollbar { display: none !important; }
    
    body { 
      background-color: var(--bg-dark); margin: 0; padding: 0; 
      display: flex; flex-direction: column; align-items: center; 
      min-height: 100vh; font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; 
      color: var(--text); overflow-x: hidden; user-select: none; -webkit-user-select: none; 
    }

    .page { 
      display: none; width: 100%; max-width: 500px; flex-direction: column; 
      align-items: center; min-height: 100vh; position: relative; 
    }
    .active-page { display: flex; }

    /* 戻るボタン */
    .back-btn { 
      position: fixed; top: 20px; left: 15px; width: 50px; height: 50px; 
      background: var(--card-bg); border-radius: 50%; border: 3px solid var(--border); 
      border-bottom-width: 5px; display: flex; align-items: center; justify-content: center; 
      cursor: pointer; z-index: 110; visibility: hidden; opacity: 0; transition: all 0.2s ease; 
      box-shadow: 0 8px 15px rgba(0,0,0,0.4); 
    }
    .back-btn.back-btn-show { visibility: visible; opacity: 1; }
    .back-btn:active { transform: translateY(3px); border-bottom-width: 2px; box-shadow: 0 4px 6px rgba(0,0,0,0.4); }
    .back-btn svg { fill: var(--text); width: 24px; height: 24px; }

    /* レベルジャンプ用 ボトムシートモーダル */
    .level-modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); display: none; align-items: flex-end;
      justify-content: center; z-index: 1000; opacity: 0; transition: opacity 0.3s ease;
    }
    .level-modal.show { display: flex; opacity: 1; }
    .level-modal-content {
      background: var(--bg-dark); width: 100%; max-width: 500px;
      border-radius: 25px 25px 0 0; padding: 25px 20px 40px 20px;
      transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: flex; flex-direction: column; gap: 15px; box-shadow: 0 -10px 25px rgba(0,0,0,0.5);
    }
    .level-modal.show .level-modal-content { transform: translateY(0); }
    .level-modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    .level-modal-title { font-size: 1.4rem; font-weight: 900; color: #fff; }
    .level-modal-close { background: #334155; border: none; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #94a3b8; padding: 0; transition: 0.1s; }
    .level-modal-close:active { transform: scale(0.9); background: #475569; }

    .level-card {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-radius: 16px; border: 3px solid; border-bottom-width: 6px;
      cursor: pointer; transition: 0.1s; background: var(--card-bg); border-color: var(--border);
    }
    .level-card:active { transform: translateY(3px); border-bottom-width: 3px; }
    .level-card-info { display: flex; flex-direction: column; gap: 4px; text-align: left; }
    .level-card-title { font-size: 1.3rem; font-weight: 900; color: #fff; }
    .level-card-desc { font-size: 0.95rem; font-weight: bold; color: #94a3b8; }
    
    /* レッスン完了 中央ポップアップ */
    .lesson-clear-overlay { 
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: rgba(0,0,0,0.7); display: none; align-items: center; 
      justify-content: center; z-index: 2000; opacity: 0; transition: opacity 0.3s ease; 
    }
    .lesson-clear-overlay.show { display: flex; opacity: 1; }
    .lesson-clear-box { 
      width: 90%; max-width: 350px; background: var(--card-bg); 
      border-radius: 16px; border: 4px solid var(--border); border-bottom-width: 8px; 
      display: flex; flex-direction: column; align-items: center; justify-content: space-between; 
      box-shadow: 0 15px 40px rgba(0,0,0,0.6); padding: 35px 25px 25px 25px; 
      transform: scale(0.8); transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); 
    }
    .lesson-clear-overlay.show .lesson-clear-box { transform: scale(1); }

    .result-stats-container { display: flex; gap: 10px; width: 100%; margin: 25px 0; justify-content: center; }
    .result-stat-box { flex: 1; border-radius: 16px; display: flex; flex-direction: column; padding: 0 4px 4px 4px; box-shadow: 0 6px 10px rgba(0,0,0,0.3); }
    .result-stat-box.green { background-color: #a3e635; }
    .result-stat-box.yellow { background-color: #eab308; }
    .stat-label { font-size: 0.95rem; font-weight: 900; color: #0f172a; text-align: center; padding: 8px 0; }
    .stat-inner { background: #1e293b; border-radius: 12px; display: flex; justify-content: center; align-items: center; padding: 15px 5px; height: 100%; }
    .stat-value-row { display: flex; align-items: center; gap: 8px; font-size: 1.4rem; font-weight: 900; color: white; }
    .command-btn { padding: 14px 20px; border: none; border-bottom: 6px solid rgba(0,0,0,0.3); border-radius: 12px; color: white; font-weight: bold; font-size: 1.3rem; cursor: pointer; transition: 0.1s; }
    .command-btn:active { transform: translateY(4px); border-bottom-width: 2px; margin-bottom: 4px; }

    /* 上部ヘッダー */
    .level-selector-wrapper {
      position: fixed; top: 0; left: 0; width: 100%; z-index: 100;
      padding: 12px 15px 12px 15px;
      background-color: var(--bg-dark);
      display: flex; justify-content: center;
      box-shadow: 0 10px 15px -10px rgba(0,0,0,0.6);
      border-bottom: 2px solid var(--border);
    }
    .level-selector-bar { 
      width: 100%; max-width: 450px; background: #38bdf8; border: 3px solid #0284c7; 
      border-bottom-width: 6px; border-radius: 20px; 
      padding: 14px 22px; display: flex; justify-content: space-between; align-items: center; 
      cursor: pointer; box-sizing: border-box; transition: background-color 0.3s, border-color 0.3s; flex-shrink: 0; 
      box-shadow: 0 8px 15px rgba(0,0,0,0.4);
      position: relative; z-index: 10;
    }
    .level-selector-bar:active { transform: translateY(4px); border-bottom-width: 2px; margin-bottom: 4px; box-shadow: 0 4px 8px rgba(0,0,0,0.4); }

    .unit-header-content { display: flex; flex-direction: column; gap: 0; align-items: flex-start; }
    .unit-header-title { font-size: 1.6rem; font-weight: 900; color: #fff; text-shadow: 0 2px 0 rgba(0,0,0,0.25); letter-spacing: 0.5px; }
    .unit-header-desc { font-size: 0.95rem; font-weight: 800; color: rgba(255, 255, 255, 0.9); }
    
    .unit-header-btn { display: flex; align-items: center; justify-content: center; color: #ffffff; padding-right: 5px; }
    .unit-header-btn svg { width: 34px; height: 34px; fill: currentColor; filter: drop-shadow(0 2px 0 rgba(0,0,0,0.25)); }

    /* セクション区切り（間隔調整済み） */
    .section-divider {
      display: flex;
      align-items: center;
      width: 85%;
      margin: 5px 0 10px 0; /* 余白を小さく */
      font-size: 1.6rem;
      font-weight: 900;
      color: #94a3b8;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
      letter-spacing: 2px;
      z-index: 10;
    }
    .section-divider::before,
    .section-divider::after {
      content: "";
      flex: 1;
      height: 2px;
      background-color: #475569;
      margin: 0 15px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }

    /* 蛇行ユニット */
    .steps-wrapper { 
      display: flex; flex-direction: column; align-items: center; width: 100%; flex-grow: 1; 
      padding: 110px 0 120px 0; gap: 30px; 
    }
    .step-unit { 
      position: relative; width: 120px; height: 120px; 
      display: flex; align-items: center; justify-content: center; 
      flex-shrink: 0; z-index: 2; transition: transform 0.3s;
    }

    .progress-ring { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.3)); }
    .ring-bg { fill: #1e293b; }
    .unit-button { 
      position: relative; width: 85px; height: 85px; 
      border-radius: 50%; 
      display: flex; align-items: center; justify-content: center; 
      cursor: pointer; box-shadow: 0 8px 0 rgba(0,0,0,0.25), 0 12px 15px rgba(0,0,0,0.4); 
      z-index: 10; border: none; transition: all 0.15s ease; 
    }
    .unit-button:active { transform: translateY(6px); box-shadow: 0 2px 0 rgba(0,0,0,0.25), 0 5px 8px rgba(0,0,0,0.4); }
    .unit-button span { color: white; font-size: 2.5rem; font-weight: 900; text-shadow: 0 4px 0px rgba(0,0,0,0.25); }
    .unit-button svg { width: 45px; height: 45px; fill: white; filter: drop-shadow(0 3px 0px rgba(0,0,0,0.25)); }

    /* ボトムナビゲーション */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 500px; height: 75px; background-color: var(--bg-dark);
      border-top: 2px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 100;
    }
    .nav-item { position: relative; width: 60px; height: 100%; display: flex; justify-content: center; align-items: center; cursor: pointer; color: #64748b; transition: color 0.2s; }
    .nav-item.active { color: #ffffff; }
    .nav-icon-placeholder { width: 32px; height: 32px; fill: currentColor; object-fit: contain; }
    .nav-indicator { position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); width: 0; height: 4px; background-color: #ffffff; border-radius: 4px; transition: width 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .nav-item.active .nav-indicator { width: 30px; }

    /* クイズ画面 */
    .quiz-title-area { margin-top: 35px; text-align: center; }
    .quiz-prog-wrapper { position: relative; width: 90%; max-width: 450px; margin-top: 25px; }
    .progress-bar-container { width: 100%; height: 18px; background: var(--border); border-radius: 12px; overflow: hidden; box-shadow: inset 0 4px 6px rgba(0,0,0,0.4); }
    .progress-bar-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2); }
    
    .matching-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 92%; max-width: 450px; margin-top: 30px; }
    .match-item { background: var(--card-bg); border: 3px solid var(--border); border-bottom-width: 8px; padding: 12px 6px; border-radius: 16px; text-align: center; font-size: 1.3rem; font-weight: 900; cursor: pointer; color: #fff; transition: all 0.2s; box-shadow: 0 8px 15px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; height: 75px; box-sizing: border-box; text-shadow: 0 3px 0 rgba(0,0,0,0.3); }
    .match-item.selected { border-color: var(--primary); background: #0ea5e9; transform: translateY(4px); border-bottom-width: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
    .match-item.solved { opacity: 0; transform: scale(0.8); pointer-events: none; }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-6px); } 40%, 80% { transform: translateX(6px); } }
    .match-item.correct-match { background: #22c55e !important; border-color: #16a34a !important; transform: scale(1.05) translateY(-4px); border-bottom-width: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
    .match-item.wrong-match { background: #ef4444 !important; border-color: #b91c1c !important; animation: shake 0.4s ease-in-out; }

    /* トグルスイッチ（設定画面用） */
    .toggle-switch { position: relative; display: inline-block; width: 60px; height: 34px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: var(--border); transition: .3s; border-radius: 34px; }
    .slider:before { position: absolute; content: ""; height: 26px; width: 26px; left: 4px; bottom: 4px; background-color: white; transition: .3s; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
    input:checked + .slider { background-color: var(--primary); }
    input:checked + .slider:before { transform: translateX(26px); }

  </style>
</head>

<body>
  <audio id="bgm-audio" loop preload="auto">
    <source src="bgm.mp4" type="audio/mp4">
    <source src="bgm.m4a" type="audio/mp4">
    <source src="bgm.mp3" type="audio/mpeg">
  </audio>

  <div id="back-btn" class="back-btn" onclick="handleBack()">
    <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
  </div>

  <!-- レベルジャンプモーダル -->
  <div id="level-modal" class="level-modal">
    <div class="level-modal-content">
      <div class="level-modal-header">
        <span class="level-modal-title">セクション</span>
        <button class="level-modal-close" onclick="closeLevelModal()">
          <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
      <div id="level-list" style="display: flex; flex-direction: column; gap: 10px;"></div>
    </div>
  </div>

  <!-- レッスン完了ポップアップ -->
  <div id="lesson-clear-overlay" class="lesson-clear-overlay">
    <div class="lesson-clear-box">
      <span style="font-size: 2.6rem; font-weight: 900; color: #ffffff; text-shadow: 0 4px 0 rgba(0,0,0,0.3); text-align: center; line-height: 1.4; letter-spacing: 2px;">レッスン<br>完了</span>
      <div class="result-stats-container">
        <div class="result-stat-box green">
          <div class="stat-label">正解率</div>
          <div class="stat-inner"><div class="stat-value-row"><span id="result-accuracy" style="color: #a3e635;">100%</span></div></div>
        </div>
        <div class="result-stat-box yellow">
          <div class="stat-label">時間</div>
          <div class="stat-inner"><div class="stat-value-row"><span id="result-time" style="color: #eab308;">1:23</span></div></div>
        </div>
      </div>
      <button class="command-btn" style="background: #38bdf8; border-bottom-color: #0284c7; width: 100%;" onclick="handleLessonContinue()">続ける</button>
    </div>
  </div>

  <!-- ホーム(ユニット選択)画面 -->
  <div id="steps-page" class="page active-page">
    <div class="level-selector-wrapper">
      <div id="level-selector-btn" class="level-selector-bar" onclick="showLevelModal()">
        <div class="unit-header-content">
          <div id="current-level-text" class="unit-header-title">入門</div>
          <div id="current-level-desc" class="unit-header-desc">基本の単語を学ぼう</div>
        </div>
        <div class="unit-header-btn">
          <svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
        </div>
      </div>
    </div>
    
    <div class="steps-wrapper" id="steps-list"></div>
  </div>

  <!-- クイズ画面 -->
  <div id="quiz-page" class="page">
    <div class="quiz-title-area">
      <div id="quiz-header" style="font-weight: 900; font-size: 1.8rem; text-shadow: 0 3px 0 rgba(0,0,0,0.4);"></div>
      <h2 id="quiz-sub" style="font-size: 1.8rem; margin: 10px 0; text-shadow: 0 3px 0 rgba(0,0,0,0.3);">ペアを選んでね！</h2>
    </div>
    <div id="quiz-prog-wrapper" class="quiz-prog-wrapper">
      <div class="progress-bar-container"><div id="quiz-progress-bar" class="progress-bar-fill"></div></div>
    </div>
    <div class="matching-container">
      <div id="col-en" style="display:flex; flex-direction:column; gap:12px;"></div>
      <div id="col-ja" style="display:flex; flex-direction:column; gap:12px;"></div>
    </div>
  </div>

  <!-- 設定画面 -->
  <div id="settings-page" class="page">
    <div style="margin-top: 40px; text-align: center; width: 100%;">
      <h1 style="font-size: 2rem; font-weight: 900; color: #fff; text-shadow: 0 3px 0 rgba(0,0,0,0.3);">設定</h1>
    </div>
    <div style="width: 90%; max-width: 400px; margin-top: 30px; display: flex; flex-direction: column; gap: 20px;">
      
      <div style="background: var(--card-bg); padding: 20px; border-radius: 16px; border: 3px solid var(--border); border-bottom-width: 6px; display:flex; justify-content: space-between; align-items:center;">
        <span style="font-weight: 900; font-size: 1.2rem; color: #f8fafc;">効果音</span>
        <label class="toggle-switch">
          <input type="checkbox" checked>
          <span class="slider"></span>
        </label>
      </div>
      
      <div style="background: var(--card-bg); padding: 20px; border-radius: 16px; border: 3px solid var(--border); border-bottom-width: 6px; display:flex; justify-content: space-between; align-items:center;">
        <span style="font-weight: 900; font-size: 1.2rem; color: #f8fafc;">BGM</span>
        <label class="toggle-switch">
          <input type="checkbox" checked>
          <span class="slider"></span>
        </label>
      </div>

    </div>
  </div>

  <!-- ボトムナビゲーション -->
  <div id="bottom-nav" class="bottom-nav">
    <div class="nav-item active" onclick="switchNavTab(this, 'steps')">
      <div class="nav-indicator"></div>
      <svg class="nav-icon-placeholder" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </div>
    
    <div class="nav-item" onclick="switchNavTab(this, 'settings')">
      <div class="nav-indicator"></div>
      <svg class="nav-icon-placeholder" viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
    </div>
  </div>

  <script>
    let speechWarmupDone = false, bgmStarted = false;
    let audioCtx = null;
    let audioUnlocked = false;

    function getAudioCtx() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      return audioCtx;
    }

    // スマホ（iOS等）での音のロック解除用処理
    function initAudio() {
      if (!audioUnlocked) {
        const ctx = getAudioCtx();
        const buffer = ctx.createBuffer(1, 1, 22050);
        const source = ctx.createBufferSource();
        source.buffer = buffer;
        source.connect(ctx.destination);
        source.start(0);
        audioUnlocked = true;
      }

      if (!speechWarmupDone && 'speechSynthesis' in window) {
        const u = new SpeechSynthesisUtterance(''); u.volume = 0; window.speechSynthesis.speak(u);
        speechWarmupDone = true;
      }
      if (!bgmStarted) {
        const bgm = document.getElementById('bgm-audio');
        if (bgm) { bgm.volume = 0.2; bgm.play().then(() => { bgmStarted = true; }).catch(e => console.log(e)); }
      }
    }

    document.addEventListener('touchstart', initAudio, {once: true});
    document.addEventListener('pointerdown', initAudio, {once: true});
    document.addEventListener('click', initAudio, {once: true});

    function playSound(type) {
      const ctx = getAudioCtx();
      const now = ctx.currentTime;
      if (type === 'clear') {
        const notes =[523.25, 659.25, 783.99, 1046.50, 1567.98];
        notes.forEach((freq, i) => {
          const o = ctx.createOscillator(), g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination); o.type = 'sine'; 
          o.frequency.setValueAtTime(freq, now + i * 0.08);
          g.gain.setValueAtTime(0, now + i * 0.08);
          g.gain.linearRampToValueAtTime(0.15, now + i * 0.08 + 0.02);
          g.gain.exponentialRampToValueAtTime(0.01, now + i * 0.08 + 0.3);
          o.start(now + i * 0.08); o.stop(now + i * 0.08 + 0.35);
        });
        return;
      }
      const o = ctx.createOscillator(), g = ctx.createGain();

    function loadData() {
      const saved = localStorage.getItem('englishAppSaveMobile');
      if (saved) {
        try {
          const data = JSON.parse(saved);
          if (data.levelProgress) levelProgress = data.levelProgress;
        } catch (e) { console.error(e); }
      }
      for (const lv in dictionaryData) { 
        if (!levelProgress[lv] || !Array.isArray(levelProgress[lv])) {
            levelProgress[lv] = Array(5).fill(0); 
        } else if (levelProgress[lv].length > 5) {
            levelProgress[lv] = levelProgress[lv].slice(0, 5);
        }
      }
    }

    function fireConfetti() {
      const container = document.createElement('div'); container.id = 'confetti-container';
      container.style.position = 'fixed'; container.style.top = '0'; container.style.left = '0';
      container.style.width = '100%'; container.style.height = '100%';
      container.style.pointerEvents = 'none'; container.style.zIndex = '2100'; 
      document.body.appendChild(container);

      const colors =['#fde047', '#38bdf8', '#22c55e', '#ef4444', '#ec4899', '#a855f7'];

      setTimeout(() => {
        for (let i = 0; i < 120; i++) {
          const conf = document.createElement('div');
          const size = Math.random() * 8 + 6;
          conf.style.width = size + 'px'; conf.style.height = (size * 0.6) + 'px';
          conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
          conf.style.position = 'absolute'; conf.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
          const isLeft = i % 2 === 0;
          const startX = isLeft ? 50 : window.innerWidth - 50; const startY = window.innerHeight - 50;
          conf.style.left = startX + 'px'; conf.style.top = startY + 'px';
          container.appendChild(conf);

          const angle = isLeft ? (Math.random() * 50 + 40) : (Math.random() * 50 + 90);
          const v = Math.random() * 30 + 20; const rad = angle * Math.PI / 180;
          let vx = Math.cos(rad) * v, vy = -Math.sin(rad) * v, x = startX, y = startY, rot = Math.random() * 360, rotV = (Math.random() - 0.5) * 20;
          
          function animate() {
            vy += 0.8; x += vx; y += vy; rot += rotV;
            conf.style.transform = `translate(${x - startX}px, ${y - startY}px) rotate(${rot}deg)`;
            if (y < window.innerHeight + 100) { requestAnimationFrame(animate); } else { conf.remove(); }
          }
          requestAnimationFrame(animate);
        }
      }, 50);

      setTimeout(() => { if (container.parentNode) container.remove(); }, 3500);
    }

      const target = document.querySelector(`.step-unit[data-level="${lv}"]`);
      if(target) {

    function openSteps() {
      const list = document.getElementById('steps-list');
      list.innerHTML = "";

      if(window.levelObserver) window.levelObserver.disconnect();
      window.levelObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const lvId = entry.target.dataset.level;
            const info = levelInfos.find(i => i.id === lvId);
            if (info) {
              document.getElementById('current-level-text').textContent = info.id;
              document.getElementById('current-level-desc').textContent = info.desc;
              const btn = document.getElementById('level-selector-btn');
              btn.style.backgroundColor = info.color;
              btn.style.borderColor = info.shadow;
            }
          }
        });
      }, { rootMargin: "-30% 0px -70% 0px" });

      let firstUnfinishedUnit = null; 
      let globalUnitIndex = 0; 

      levelInfos.forEach((info, index) => {
        const lv = info.id;
        
        const anchor = document.createElement('div');
        anchor.id = 'section-' + lv;
        list.appendChild(anchor);

        const divider = document.createElement('div');
        divider.className = 'section-divider';
        divider.innerHTML = `<span>${lv}</span>`;
        list.appendChild(divider);

        for(let i=0; i<5; i++) {
          const unit = document.createElement('div'); unit.className = 'step-unit';
          
          if (i === 0) {
            unit.dataset.level = lv;
            window.levelObserver.observe(unit);
          }

          const progress = globalUnitIndex / 19; 
          const offsetX = Math.sin(progress * Math.PI * 5) * 90;
          
          unit.style.transform = `translateX(${offsetX}px)`;
          globalUnitIndex++;

          const currentProg = levelProgress[lv][i] || 0;
          const prog = currentProg % 5 === 0 && currentProg > 0 ? 5 : currentProg % 5;
          const cycles = Math.floor(currentProg / 5);
          const isFullCleared = cycles > 0 || prog === 5;
          
          const icon = i === 0 ? `<svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>` : `<span>${i+1}</span>`;

          let ringHtml = `<svg class="progress-ring" viewBox="0 0 160 160"><circle class="ring-bg" cx="80" cy="80" r="72" stroke="none" />`;
          const r = 72, c = 2 * Math.PI * r, gap = 20, dash = c / 5 - gap, remain = c - dash;

          for(let j=0; j<5; j++) {
            const isCleared = cycles > 0 || j < prog;
            const ringColor = isCleared ? info.color : '#334155';
            const angle = -90 + (j * 72) + ((gap / c) * 360 / 2);
            ringHtml += `<circle cx="80" cy="80" r="${r}" fill="none" stroke="${ringColor}" stroke-width="12" stroke-linecap="round" stroke-dasharray="${dash} ${remain}" transform="rotate(${angle} 80 80)" style="cursor:pointer; transition: all 0.2s; pointer-events: stroke;" onpointerdown="playSpecificSet('${lv}', ${i}, ${j}, ${isCleared})" />`;
          }
          ringHtml += `</svg>`;
          
          unit.innerHTML = `${ringHtml}<button class="unit-button" style="background:${info.color}; border-bottom: 6px solid ${info.shadow};" onclick="startQuiz('${lv}', ${i})">${icon}</button>`;
          
          if (!firstUnfinishedUnit && !isFullCleared) {
            firstUnfinishedUnit = unit;
          }

          list.appendChild(unit);
        }
      });
      
      showPage('steps');

      if (isFirstLoad) {
        setTimeout(() => {
          if (firstUnfinishedUnit) {
            const y = firstUnfinishedUnit.getBoundingClientRect().top + window.scrollY - (window.innerHeight / 2) + 65;
            window.scrollTo({top: y, behavior: 'auto'});
            savedScrollY = window.scrollY;
          }
          isFirstLoad = false;
        }, 50);
      } else {
        window.scrollTo(0, savedScrollY);
      }
    }

    let activeUnitIdx = 0, sessionWords =[], wordQueue =[], sEn = null, sJa = null, totalSolved = 0, isSpecificReview = false; 

    function startQuiz(lv, unitIdx) { 
      playSound('click'); 
      curLevel = lv; 
      isSpecificReview = false; activeUnitIdx = unitIdx; totalSolved = 0;
      quizStartTime = Date.now(); quizMistakes = 0;
      
      let currentProg = levelProgress[lv][unitIdx] || 0;
      let prog = currentProg % 5, isUnitCleared = currentProg >= 5;
      let pool = dictionaryData[lv] || dictionaryData["入門"];
      
      if (isUnitCleared) {
        let startIndex = unitIdx * 90;
        let unitWords = pool.slice(startIndex, startIndex + 90);
        if (unitWords.length === 0) unitWords = pool;
        let shuffled = [...unitWords].sort(() => Math.random() - 0.5);
        sessionWords = shuffled.slice(0, 18);
      } else {
        let offset = (unitIdx * 90) + (prog * 18);
        sessionWords = pool.slice(offset, offset + 18);
      }
      
      if (sessionWords.length < 18) {
        let remain = 18 - sessionWords.length; sessionWords = sessionWords.concat(pool.slice(0, remain));
      }
      loadSet(); showPage('quiz'); 
    }

    function playSpecificSet(lv, unitIdx, subIdx, isCleared) {
      if (!isCleared) return; 
      
      playSound('click'); 
      curLevel = lv; 
      isSpecificReview = true; activeUnitIdx = unitIdx; totalSolved = 0;
      quizStartTime = Date.now(); quizMistakes = 0;
      
      let pool = dictionaryData[lv] || dictionaryData["入門"];
      let offset = (unitIdx * 90) + (subIdx * 18);
      sessionWords = pool.slice(offset, offset + 18);
      
      if (sessionWords.length < 18) {
        let remain = 18 - sessionWords.length; sessionWords = sessionWords.concat(pool.slice(0, remain));
      }
      loadSet(); showPage('quiz'); 
    }

    function loadSet() {
      sEn = sJa = null; wordQueue =[...sessionWords];
      const headerEl = document.getElementById('quiz-header');
      const info = levelInfos.find(i => i.id === curLevel);
      const color = info ? info.color : '#38bdf8';

      if (isSpecificReview) { headerEl.innerHTML = `<span style="color: ${color};">${curLevel}</span> <span style="color: #ffffff;">復習</span>`; } 
      else { headerEl.innerHTML = `<span style="color: ${color};">${curLevel}</span> <span style="color: #ffffff;">Unit ${activeUnitIdx+1}</span>`; }

      const progFill = document.getElementById('quiz-progress-bar');
      progFill.style.width = "0%";
      progFill.style.backgroundColor = color;

      const enC = document.getElementById('col-en'); const jaC = document.getElementById('col-ja');
      enC.innerHTML = ""; jaC.innerHTML = "";
      
      const initialWords = wordQueue.splice(0, 5);
      const shuf = (a) =>[...a].sort(() => Math.random() - 0.5);
      shuf(initialWords).forEach(w => enC.appendChild(createItem(w.e, 'e')));
      shuf(initialWords).forEach(w => jaC.appendChild(createItem(w.j, 'j')));
    }

    function applyFontSize(el, t, type) {
      el.style.whiteSpace = "normal"; el.style.wordBreak = "break-word"; el.style.letterSpacing = "normal";
      if (type === 'e') {
        if (t.includes(' ') || t.length >= 12) el.style.fontSize = "1.05rem";
        else if (t.length >= 9) el.style.fontSize = "1.15rem";
        else el.style.fontSize = "1.3rem";
      } else {
        if (t.length >= 12) el.style.fontSize = "0.95rem";
        else if (t.length >= 8) el.style.fontSize = "1.1rem";
        else el.style.fontSize = "1.3rem";
      }
    }

    function createItem(t, type) {
      const shuf = (a) =>[...a].sort(() => Math.random() - 0.5);
      const d = document.createElement('div'); d.className = 'match-item'; d.textContent = t;
      applyFontSize(d, t, type);

      d.onpointerdown = () => {
        if(d.classList.contains('solved') || d.classList.contains('correct-match') || d.classList.contains('wrong-match')) return;
        if(d === sEn || d === sJa) return;
        
        if (type === 'e') speakWord(d.textContent); else playSound('click');

        d.parentElement.querySelectorAll('.match-item.selected').forEach(i => {
          if(!i.classList.contains('correct-match') && !i.classList.contains('wrong-match')) i.classList.remove('selected');
        });
        
        d.classList.add('selected');
        if(type === 'e') sEn = d; else sJa = d;
        
        if(sEn && sJa) {
          const match = sessionWords.find(w => w.e === sEn.textContent && w.j === sJa.textContent);
          const curEn = sEn; const curJa = sJa;
          sEn = sJa = null; 
          
          if(match) {
            curEn.classList.add('correct-match'); curJa.classList.add('correct-match');
            playSound('correct'); 

            setTimeout(() => {
              curEn.style.transition = "opacity 0.75s ease, transform 0.75s ease, background 0.2s, border-color 0.2s, box-shadow 0.2s";
              curJa.style.transition = "opacity 0.75s ease, transform 0.75s ease, background 0.2s, border-color 0.2s, box-shadow 0.2s";
              curEn.classList.add('solved'); curJa.classList.add('solved');
              curEn.classList.remove('correct-match', 'selected'); curJa.classList.remove('correct-match', 'selected');
              totalSolved++; document.getElementById('quiz-progress-bar').style.width = (totalSolved / 18 * 100) + "%";
              
              if(totalSolved === 18) { 
                setTimeout(() => { 
                  playSound('clear'); fireConfetti();
                  if (!isSpecificReview) { levelProgress[curLevel][activeUnitIdx]++; }
                  saveData();
                  let endTime = Date.now(), timeDiff = Math.floor((endTime - quizStartTime) / 1000);
                  let m = Math.floor(timeDiff / 60), s = timeDiff % 60, accuracy = Math.floor((18 / (18 + quizMistakes)) * 100);

                  document.getElementById('result-accuracy').textContent = `${accuracy}%`;
                  document.getElementById('result-time').textContent = `${m}:${s.toString().padStart(2, '0')}`;

                  lessonContinueCallback = () => { openSteps(); };

                  const clearOverlay = document.getElementById('lesson-clear-overlay');
                  clearOverlay.style.display = 'flex'; setTimeout(() => clearOverlay.classList.add('show'), 10);
                }, 750);
              } else if (totalSolved === 5) {
                setTimeout(() => {
                  const enC = document.getElementById('col-en'), jaC = document.getElementById('col-ja');
                  enC.innerHTML = ""; jaC.innerHTML = "";
                  const nextBatch = wordQueue.splice(0, 5);
                  const enItems = shuf([...nextBatch]).map(w => createItem(w.e, 'e'));
                  const jaItems = shuf([...nextBatch]).map(w => createItem(w.j, 'j'));
                  
                  enItems.forEach(el => { el.classList.add('solved'); el.style.transition = "none"; enC.appendChild(el); });
                  jaItems.forEach(el => { el.classList.add('solved'); el.style.transition = "none"; jaC.appendChild(el); });
                  
                  requestAnimationFrame(() => { requestAnimationFrame(() => {
                    enItems.forEach(el => { el.style.transition = "opacity 0.75s ease, transform 0.75s ease"; el.classList.remove('solved'); });
                    jaItems.forEach(el => { el.style.transition = "opacity 0.75s ease, transform 0.75s ease"; el.classList.remove('solved'); });
                    setTimeout(() => {
                      enItems.forEach(el => el.style.transition = ""); jaItems.forEach(el => el.style.transition = "");
                    }, 750);
                  });});
                }, 750);
              } else if (totalSolved > 5) {
                const nextWord = wordQueue.shift();
                if (nextWord) {
                  setTimeout(() => {
                    curEn.style.transition = "none"; curJa.style.transition = "none";
                    curEn.textContent = nextWord.e; applyFontSize(curEn, nextWord.e, 'e');
                    curJa.textContent = nextWord.j; applyFontSize(curJa, nextWord.j, 'j');
                    curEn.classList.add('solved'); curJa.classList.add('solved');
                    
                    requestAnimationFrame(() => { requestAnimationFrame(() => {
                      curEn.style.transition = "opacity 0.75s ease, transform 0.75s ease";
                      curJa.style.transition = "opacity 0.75s ease, transform 0.75s ease";
                      curEn.classList.remove('solved'); curJa.classList.remove('solved');
                      setTimeout(() => { curEn.style.transition = ""; curJa.style.transition = ""; }, 750);
                    });});
                  }, 750); 
                }
              }
            }, 300); 

          } else {
            curEn.classList.add('wrong-match'); curJa.classList.add('wrong-match');
            playSound('wrong'); quizMistakes++;
            setTimeout(() => { curEn.classList.remove('selected', 'wrong-match'); curJa.classList.remove('selected', 'wrong-match'); }, 400);
          }
        }
      };
      return d;
    }

    window.onload = () => {
      loadData(); 
      openSteps(); 
    };
  </script>
</body>
</html>
